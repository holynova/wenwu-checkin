<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文物打卡 · 195 件禁止出境展览文物图鉴</title><meta name="description" content="195 件/组禁止出境展览文物移动端打卡图鉴，先上线 20 张 Gemini 卡通图，其余占位逐批补齐。"><link rel="stylesheet" href="styles.css"></head><body><header class="hero"><div class="eyebrow">WENWU CHECK-IN · v0.1</div><h1>文物打卡</h1><p>以国家文物局三批禁止出国（境）/出境展览文物目录为基础，做成移动端可搜索、可筛选、可打卡的图鉴网站。当前第一版先放入 20 张 Gemini 卡通图，其余文物使用占位图；后续每生成 20 张就追加进网站。</p><div class="stats"><div class="stat"><b id="statTotal">—</b><span>总文物件/组</span></div><div class="stat"><b id="statImages">—</b><span>已生成图片</span></div><div class="stat"><b id="statWait">—</b><span>占位待补</span></div><div class="stat"><b id="statChecked">—</b><span>本机已打卡</span></div></div></header><div class="toolbar"><div class="toolbar-inner"><input id="search" class="search" placeholder="搜索文物、时代、馆藏、类别…"><div class="pills"><button class="pill active" data-image="all">全部图片状态</button><button class="pill" data-image="done">已出图</button><button class="pill" data-image="todo">占位待补</button></div></div></div><main><div class="section-title"><h2>大表格切换</h2><small><span id="tableCount">0</span> 条</small></div><section class="switch-table"><div class="tabs"><button class="tab active" data-table="progress">全部数据</button><button class="tab" data-table="with-images">本次 20 张已出图</button><button class="tab" data-table="placeholder">后续待补图片</button><button class="tab" data-table="batch">当前筛选结果</button><button class="tab" data-table="checked">已打卡</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>ID</th><th>批次</th><th>名称</th><th>类别</th><th>时代</th><th>馆藏</th><th>图片</th></tr></thead><tbody id="tableBody"></tbody></table></div></section><div class="section-title"><h2>图鉴卡片</h2><small><span id="resultCount">0</span> 条</small></div><div class="pills" style="margin-bottom:12px"><button class="pill active" data-batch="all">全部批次</button><button class="pill" data-batch="第一批">第一批</button><button class="pill" data-batch="第二批">第二批</button><button class="pill" data-batch="第三批">第三批</button></div><div id="categoryPills" class="pills" style="margin-bottom:18px"></div><div id="grid" class="grid"></div><div class="empty">没有匹配的文物</div></main><div id="modal" class="modal"><div class="panel"><img id="modalImg" alt=""><div class="panel-text"><button id="closeModal" class="close">×</button><h2 id="modalTitle"></h2><p id="modalMeta" class="meta"></p><p id="modalNote"></p><p id="modalExtra" class="meta"></p></div></div></div><footer class="footer">数据：国家文物局三批禁止出境展览文物目录 · 图片：OpenCLI Gemini 分批生成 · v0.1-first-20</footer><script src="app.js"></script></body></html>
